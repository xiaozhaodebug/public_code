# NXP S32K144 OpenOCD Configuration (Memory-based flashing)

adapter driver jlink
transport select swd
adapter speed 2000

# SWD DAP
swd newdap s32k144 cpu -irlen 4 -ircapture 0x1 -irmask 0xf -expected-id 0x2ba01477
dap create s32k144.dap -chain-position s32k144.cpu

# Target
set CHIPNAME s32k144
target create $CHIPNAME.cpu cortex_m -dap $CHIPNAME.dap

# Working area
$CHIPNAME.cpu configure -work-area-phys 0x1FFF8000 -work-area-size 0x8000

reset_config srst_only srst_nogate
